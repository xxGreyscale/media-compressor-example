# Netlify deploy config for the React/Vite example.
#
# The build runs `npm run build` (tsc + vite build) and publishes the static
# bundle from `dist/`. No serverless functions, no edge functions — this is a
# pure SPA that does all its work in the browser via WebCodecs / WASM.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # The example has no postinstall hooks; npm ci is the safer install path.
  NPM_FLAGS = "--prefer-offline --no-audit --no-fund"

# Cache Vite's hashed asset bundle aggressively. `index.html` stays uncached
# so deploys roll out immediately; everything under /assets/ is content-hashed
# in the filename and safe to cache for a year.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Single-page-app fallback. The demo doesn't use client-side routing today,
# but this keeps deep-link refreshes working if you ever add it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
